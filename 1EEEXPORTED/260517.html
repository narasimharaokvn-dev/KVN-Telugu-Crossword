<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu&amp;display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
      *{box-sizing:border-box;}
      
      /* Desktop styles */
      body{font-family:Arial;text-align:center;background:#f5f5f5;padding:20px;margin:0;}
      #headerSection{display:block;}
      #title{margin-bottom:10px;}
      #buttonBar{margin:10px 0;}
      #buttonBar button{padding:8px 16px;margin:5px;cursor:pointer;border:1px solid #ccc;background:#fff;border-radius:3px;}
      #clueBox{width:90%;max-width:500px;margin:10px auto 20px auto;background:white;border:1px solid #ccc;padding:10px;box-shadow:0 0 10px rgba(0,0,0,0.15);text-align:left;}
      #puzzleContainer{display:block;}
      #container{position:relative;display:inline-block;max-width:100%;}
      #puzzle{width:480px;max-width:100%;height:auto;display:block;}
      #grid{position:absolute;top:0;left:0;}
      .cell{position:absolute;}
      .cell input{width:100%;height:100%;border:none;background:transparent;text-align:center;font-family:"Noto Sans Telugu";outline:none;line-height:1.1;overflow:hidden;padding:0;}
      .cell input:focus{background:transparent;border:2px solid #3498db;}
      
      /* Mobile-specific styles */
      @media (max-width: 768px) {
        html{width:100%;height:100%;position:fixed;overflow:hidden;}
        body{margin:0;padding:0;width:100%;height:100%;position:fixed;overflow:hidden;}
        
        #headerSection{position:absolute;top:0;left:0;right:0;z-index:1000;background:#f5f5f5;will-change:transform;}
        
        #title{margin:0;padding:8px;font-size:18px;background:#f5f5f5;border-bottom:1px solid #ddd;}
        
        #buttonBar{padding:5px;background:#f5f5f5;border-bottom:1px solid #ddd;margin:0;}
        #buttonBar button{padding:6px 12px;margin:3px;font-size:12px;}
        
        #clueBox{margin:0;border-radius:0;border-left:none;border-right:none;width:100%;max-width:none;min-height:70px;font-size:14px;background:white;border-top:1px solid #ccc;border-bottom:2px solid #333;padding:10px;}
        
        #puzzleContainer{position:absolute;top:150px;left:0;right:0;bottom:0;overflow-y:scroll;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:10px;text-align:center;will-change:top,height;}
        
        #container{display:inline-block;}
      }
    </style>
  </head><body>

      </div>
      <div id="clueBox">Click a numbered cell</div>
    </div>
    <div id="puzzleContainer">
      <div id="container">
        <img id="puzzle">
        <div id="grid"></div>
      </div>
    </div>

    let answers = {};
    const gridRows = Math.max(1, rowLines.length - 1);
    const gridCols = Math.max(1, colLines.length - 1);
    
    const img = document.getElementById("puzzle");
    const grid = document.getElementById("grid");
    const clueBox = document.getElementById("clueBox");
    const puzzleContainer = document.getElementById("puzzleContainer");
    const headerSection = document.getElementById("headerSection");
    const puzzleKey = "puzzle_260517_answers";
    let lastGridWidth = 0;
    
    // Handle Android keyboard using Visual Viewport API
    if(window.innerWidth <= 768 && window.visualViewport){
      const viewport = window.visualViewport;
      
      function updateLayout(){
        // Get the visual viewport dimensions
        const offsetTop = viewport.offsetTop;
        const viewportHeight = viewport.height;
        
        // Keep header fixed at visual viewport top
        headerSection.style.transform = 'translateY(' + offsetTop + 'px)';
        
        // Adjust puzzle container to fill remaining space
        const headerHeight = headerSection.offsetHeight;
        puzzleContainer.style.top = (headerHeight + offsetTop) + 'px';
        puzzleContainer.style.height = (viewportHeight - headerHeight) + 'px';
      }
      
      viewport.addEventListener('resize', updateLayout);
      viewport.addEventListener('scroll', updateLayout);
      
      // Initial layout
      setTimeout(updateLayout, 100);
      
      // Handle input focus
      document.addEventListener('focusin', function(e){
        if(e.target.tagName === 'INPUT'){
          setTimeout(function(){
            updateLayout();
            
            // Scroll input into view within container
            const inputRect = e.target.getBoundingClientRect();
            const containerRect = puzzleContainer.getBoundingClientRect();
            
            if(inputRect.bottom > containerRect.bottom - 20){
              const scrollAmount = inputRect.bottom - containerRect.bottom + 50;
              puzzleContainer.scrollTop += scrollAmount;
            }
          }, 300);
        }
      });
    }
    
    img.src = puzzleImage;
    
    // Load saved progress
    function loadProgress(){
      try{
        let saved = localStorage.getItem(puzzleKey);
        if(saved) answers = JSON.parse(saved);
      }catch(e){
        console.log("No saved progress found");
      }
    }
    
    // Save progress automatically
    function saveProgress(){
      try{
        localStorage.setItem(puzzleKey, JSON.stringify(answers));
      }catch(e){
        console.log("Could not save progress");
      }
    }
    
    // Show save notification
    function showSaveNotification(){
      let msg = document.createElement('div');
      msg.innerHTML = '✅ Progress saved';
      msg.style.cssText = 'position:fixed;top:20px;left:20px;background:#27ae60;color:white;padding:8px 12px;border-radius:3px;font-size:12px;z-index:10000;box-shadow:0 2px 8px rgba(0,0,0,0.2);';
      document.body.appendChild(msg);
      setTimeout(function(){
        if(msg.parentNode) msg.parentNode.removeChild(msg);
      }, 2000);
    }
    
    function move(r,c){
      let next = document.querySelector('input[data-row="'+r+'"][data-col="'+c+'"]');
      if(next){next.focus()}
    }
    
    function createGrid(){
      let w = img.clientWidth;
      let h = img.clientHeight;
      lastGridWidth = w;
      
      grid.style.width = w+"px";
      grid.style.height = h+"px";
      grid.innerHTML = "";

      // Read saved values first so redraw/resizing does not drop typed letters.
      loadProgress();
      
      for(let r=0;r<gridRows;r++){
        for(let c=0;c<gridCols;c++){
          let cell = document.createElement("div");
          cell.className = "cell";
          
          let x = w*colLines[c];
          let y = h*rowLines[r];
          let cw = w*(colLines[c+1]-colLines[c]);
          let ch = h*(rowLines[r+1]-rowLines[r]);
          
          cell.style.left = x+"px";
          cell.style.top = y+"px";
          cell.style.width = cw+"px";
          cell.style.height = ch+"px";
          
          let input = document.createElement("input");
          input.type = "text";
          input.maxLength = 10;
          input.dataset.row = r;
          input.dataset.col = c;

          // Font scales as a percentage of the current cell size.
          let cellBase = Math.min(cw, ch);
          let sizePercent = 0.62;
          let fontSize = Math.max(12, Math.min(30, Math.floor(cellBase * sizePercent)));
          input.style.fontSize = fontSize + "px";
          
          // Restore saved answer
          let key = r+"-"+c;
          if(answers[key]){
            input.value = answers[key];
          }
          
          input.addEventListener("keydown",function(e){
            let row = parseInt(this.dataset.row);
            let col = parseInt(this.dataset.col);
            
            if(e.key==="ArrowRight"){e.preventDefault();move(row,col+1)}
            if(e.key==="ArrowLeft"){e.preventDefault();move(row,col-1)}
            if(e.key==="ArrowDown"){e.preventDefault();move(row+1,col)}
            if(e.key==="ArrowUp"){e.preventDefault();move(row-1,col)}
            if(e.key==="Enter"){e.preventDefault();move(row,col+1)}
          });
          
          // Auto-save on input with Telugu character handling
          input.addEventListener("input",function(){
            let key = this.dataset.row+"-"+this.dataset.col;
            let value = this.value;
            
            // Handle Telugu character composition properly
            if(value.length > 8){
              value = value.slice(-6);
              this.value = value;
            }
            
            answers[key] = value;
            saveProgress();
          });
          
          cell.onclick = function(){
            input.focus();
            
            let key = r+"-"+c;
            let num = numbers[key];
            
            if(!num){
              clueBox.innerHTML = "No clue";
              return;
            }
            
            let across = clues.across[num]||"";
            let down = clues.down[num]||"";
            
            clueBox.innerHTML = "<b>"+num+" Across:</b> "+across+"<br><br><b>"+num+" Down:</b> "+down;
          };
          
          cell.appendChild(input);
          grid.appendChild(cell);
        }
      }
      
      // Restore answers to inputs
      for(let key in answers){
        let input = document.querySelector('input[data-row="'+key.split('-')[0]+'"][data-col="'+key.split('-')[1]+'"]');
        if(input && answers[key]){
          input.value = answers[key];
        }
      }
    }
    
    // Manual save function
    function manualSave(){
      saveProgress();
      showSaveNotification();
    }
    
    // Clear all answers
    function clearAnswers(){
      if(!confirm("Clear all answers?")) return;
      
      answers = {};
      saveProgress();
      
      // Clear all input fields
      document.querySelectorAll('.cell input').forEach(function(input){
        input.value = "";
      });
      
      let msg = document.createElement('div');
      msg.innerHTML = '🗑️ Answers cleared';
      msg.style.cssText = 'position:fixed;top:20px;left:20px;background:#e74c3c;color:white;padding:8px 12px;border-radius:3px;font-size:12px;z-index:10000;box-shadow:0 2px 8px rgba(0,0,0,0.2);';
      document.body.appendChild(msg);
      setTimeout(function(){
        if(msg.parentNode) msg.parentNode.removeChild(msg);
      }, 2000);
    }
    
    img.onload = function(){
      setTimeout(createGrid,100);
    };

    window.addEventListener("resize", function(){
      // Mobile keyboard toggles viewport height and fires resize events.
      // Redraw only when width changes, so focused input is not disrupted.
      if(document.activeElement && document.activeElement.matches('.cell input')) return;

      let currentWidth = img.clientWidth;
      if(Math.abs(currentWidth - lastGridWidth) < 2) return;

      clearTimeout(window.__gridResizeTimer);
      window.__gridResizeTimer = setTimeout(createGrid, 120);
    });
  </script></body></html>
