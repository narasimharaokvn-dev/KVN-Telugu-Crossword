<!DOCTYPE html>
<html>
<head>
<title>Puzzle Admin</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
textarea { width: 100%; height: 250px; }
</style>
</head>
<body>

<h2>Puzzle Admin</h2>

Folder:
<select id="folder">
    <option>1EEEXPORTED</option>
    <option>2EEEXPORTED</option>
    <option>3EEEXPORTED</option>
    <option>4EEEXPORTED</option>
    <option>5EEEXPORTED</option>
</select>

<br><br>

Puzzle Date:
<input type="text" id="pdate" value="260607">

<br><br>

<button onclick="generate()">Generate latest.html</button>

<br><br>

<textarea id="output"></textarea>

<br><br>

<button onclick="downloadFile()">Download latest.html</button>

<script>

function generate() {

    let folder = document.getElementById("folder").value;
    let pdate  = document.getElementById("pdate").value;

    let html =
`<!DOCTYPE html>
<html>
<head>
<meta http-equiv="refresh" content="0; url=./${folder}/${pdate}.html">
<title>Loading Latest Puzzle...</title>
</head>
<body>
Loading latest puzzle...
</body>
</html>`;

    document.getElementById("output").value = html;
}

function downloadFile() {

    let text = document.getElementById("output").value;

    let blob = new Blob([text], {type: "text/html"});

    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "latest.html";
    a.click();
}

</script>

</body>
</html>
